<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Family Fork{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍴</text></svg>" />
</head>
<body>

<nav class="nav">
  <a class="nav-logo" href="{{ url_for('home') }}">🍴 <span>Family Fork</span></a>
  <div class="nav-links">
    <a href="{{ url_for('home') }}" {% if request.endpoint == 'home' %}class="active"{% endif %}>Home</a>
    <a href="{{ url_for('cookbook') }}" {% if request.endpoint == 'cookbook' %}class="active"{% endif %}>Cookbook</a>
    <a href="{{ url_for('nutrition') }}" {% if request.endpoint == 'nutrition' %}class="active"{% endif %}>📊 Nutrition</a>
    <a href="{{ url_for('intake') }}" {% if request.endpoint == 'intake' %}class="active"{% endif %}>🎯 Daily Intake</a>
    <a href="{{ url_for('fridge') }}" {% if request.endpoint == 'fridge' %}class="active"{% endif %}>🧊 Fridge</a>
    <a href="{{ url_for('profile') }}" {% if request.endpoint == 'profile' %}class="active"{% endif %}>My Profile</a>
  </div>
</nav>

{% block content %}{% endblock %}

<footer class="footer">
  🍴 Family Fork · Recipes generated with AI · Delivered daily at 5 PM
</footer>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
